version: 2

models:
  - name: int_person
    config:
      schema: omop
      materialized: view
      columns:
        - name: person_id
          data_type: integer
          tests:
            - unique
            - not_null
        - name: gender_concept_id
          data_type: integer
        - name: year_of_birth
          data_type: integer
        - name: month_of_birth
          data_type: integer
        - name: day_of_birth
          data_type: integer
        - name: birth_datetime
          data_type: timestamp
        - name: race_concept_id
          data_type: integer
        - name: ethnicity_concept_id
          data_type: integer
        - name: location_id
          data_type: integer
        - name: provider_id
          data_type: integer
        - name: care_site_id
          data_type: integer
        - name: person_source_value
          data_type: varchar
        - name: gender_source_value
          data_type: varchar
        - name: gender_source_concept_id
          data_type: integer
        - name: race_source_value
          data_type: varchar
        - name: race_source_concept_id
          data_type: integer
        - name: ethnicity_source_value
          data_type: varchar
        - name: ethnicity_source_concept_id
          data_type: integer

  - name: int_visit_occurrence
    config:
      schema: omop
      materialized: view
      columns:
        - name: visit_occurrence_id
          data_type: integer
          tests:
            - unique
            - not_null
        - name: person_id
          data_type: integer
          tests:
            - not_null
        - name: visit_concept_id
          data_type: integer
          tests:
            - not_null
        - name: visit_start_date
          data_type: date
          tests:
            - not_null
        - name: visit_start_datetime
          data_type: datetime
        - name: visit_end_date
          data_type: date
          tests:
            - not_null
        - name: visit_end_datetime
          data_type: datetime
        - name: visit_type_concept_id
          data_type: integer
          tests:
            - not_null
        - name: provider_id
          data_type: integer
        - name: care_site_id
          data_type: integer
        - name: visit_source_value
          data_type: varchar(50)
        - name: visit_source_concept_id
          data_type: integer
        - name: admitted_from_concept_id
          data_type: integer
        - name: admitted_from_source_value
          data_type: varchar(50)
        - name: discharged_to_concept_id
          data_type: integer
        - name: discharged_to_source_value
          data_type: varchar(50)
        - name: preceding_visit_occurrence_id
          data_type: integer
