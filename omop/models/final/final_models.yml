          data_type: date
          tests:
            - not_null
        - name: visit_start_datetime
          data_type: datetime
        - name: visit_end_date
          data_type: date
          tests:
            - not_null
        - name: visit_end_datetime
          data_type: datetime
        - name: visit_type_concept_id
          data_type: integer
          tests:
            - not_null
        - name: provider_id
          data_type: integer
        - name: care_site_id
          data_type: integer
        - name: visit_source_value
          data_type: varchar(50)
        - name: visit_source_concept_id
          data_type: integer
        - name: admitted_from_concept_id
          data_type: integer
