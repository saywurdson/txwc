version: 2

models:
  - name: fact_pharmacy_claim
    description: "Fact table for pharmacy claim line items, combining detail and header information."
    config:
      schema: claims_model
      materialized: incremental
      alias: pharmacy_claim 
      columns:
        - name: bill_id
          description: "Bill ID uniquely identifies a bill and links line items to the bill."
          tests:
            - not_null

        - name: bill_detail_id
          description: "Bill Detail ID uniquely identifies a bill line item."
          tests:
            - not_null

        - name: line_number
          description: "The number of the line item on the bill."
          tests:
            - not_null

        - name: patient_account_number
          description: "A unique number assigned by the provider to identify the patient/claimant."

        - name: employer_fein
          description: "The federal identification number of the employer where the employee was employed at the time of the injury."

        - name: facility_fein
          description: "The federal identification number of the facility where the medical services were rendered."

        - name: insurer_fein
          description: "The federal identification number of the carrier or self-insured assuming responsibility for workers' compensation claims."

        - name: provider_fein
          description: "The federal tax identification number of the provider, derived from billing_provider_fein, rendering_bill_provider_fein, or referring_provider_fein."

        - name: total_charge_per_bill
          description: "The cumulative dollar amount of all line items on the bill."

        - name: total_amount_paid_per_bill
          description: "The total dollar amount paid or credited for the entire bill."

        - name: total_amount_paid_per_line
          description: "The total dollar amount paid or credited to the line item."

        - name: drugs_supplies_billed_amount
          description: "The amount billed for drugs/supplies."

        - name: ndc_billed_code
          description: "The National Drug Code (or equivalent code value) identifying the drugs or pharmaceutical products billed."

        - name: prescription_line_number
          description: "A unique number assigned by the dispenser to identify the prescription at the line level."

        - name: dispensed_as_written_code
          description: >
            "A code denoting methodology used in dispensing the drugs or pharmaceuticals.
            Dispense as Written Code - ANSI DE 1329:
            0 = Not dispense as written
            1 = Physician dispense as written
            2 = Patient dispense as written
            3 = Pharmacy dispense as written
            4 = No generic available
            5 = Brand dispensed as generic
            6 = Override
            7 = Substitution not allowed - brand name drug mandated by law
            8 = Substitution not allowed - generic not available in marketplace
            9 = Other"

        - name: drug_name
          description: "Name of the dispensed drug or pharmaceutical."

        - name: basis_of_cost_determination
          description: >
            "Method by which drug cost was calculated.
            0 = Not Specified
            1 = Average Wholesale Price (AWP)
            2 = Local Wholesaler
            3 = Direct
            4 = Estimated Acquisition Cost
            5 = Acquisition Cost
            6 = Maximum Allowable Cost (MAC)
            7 = Usual, Customary and Reasonable (UCR)
            8 = Unit Dose
            9 = Brand Medically Necessary"

        - name: service_line_from_date
          description: "The starting date that services were performed for the line item."

        - name: service_line_to_date
          description: "The ending date that services were performed for the line item."

        - name: prescription_line_date
          description: "The date the prescription was filled at the bill level."

        - name: drugs_supplies_quantity
          description: "The number of units of drugs/supplies dispensed."

        - name: drugs_supplies_number_of
          description: "The number of units of drugs/supplies."

        - name: drugs_supplies_dispensing
          description: "Amount billed for dispensing drugs/supplies."

        - name: ndc_paid_code
          description: "Identifies the drug or pharmaceutical that was paid."

        - name: days_units_paid
          description: "The number of services paid for the line item in days or units."

        - name: rendering_line_provider
          description: "The unique National Provider ID of the rendering line provider."

        - name: number_of_service_adjustments
          description: "The number of service adjustments for the line item."

        - name: service_adjustment_group_1
          description: >
            "A code indicating the general category of the first adjustment made to the line item.
            CO = Contractual Obligations
            OA = Other Adjustments
            PI = Payer initiated reductions
            PR = Patient Responsibility"

        - name: service_adjustment_reason_1
          description: "A code indicating the detailed reason for the first adjustment made to the line item."

        - name: service_adjustment_amount_1
          description: "The dollar amount of the first adjustment paid or credited to the line item."

        - name: service_adjustment_units_1
          description: "The number of units applicable to the first adjustment made to the line item."

        - name: service_adjustment_group_2
          description: >
            "A code indicating the general category of the second adjustment made to the line item.
            CO = Contractual Obligations
            OA = Other Adjustments
            PI = Payer initiated reductions
            PR = Patient Responsibility"

        - name: service_adjustment_reason_2
          description: "A code indicating the detailed reason for the second adjustment made to the line item."

        - name: service_adjustment_amount_2
          description: "The dollar amount of the second adjustment paid or credited to the line item."

        - name: service_adjustment_units_2
          description: "The number of units applicable to the second adjustment made to the line item."

        - name: service_adjustment_group_3
          description: >
            "A code indicating the general category of the third adjustment made to the line item.
            CO = Contractual Obligations
            OA = Other Adjustments
            PI = Payer initiated reductions
            PR = Patient Responsibility"

        - name: service_adjustment_reason_3
          description: "A code indicating the detailed reason for the third adjustment made to the line item."

        - name: service_adjustment_amount_3
          description: "The dollar amount of the third adjustment paid or credited to the line item."

        - name: service_adjustment_units_3
          description: "The number of units applicable to the third adjustment made to the line item."

        - name: service_adjustment_group_4
          description: >
            "A code indicating the general category of the fourth adjustment made to the line item.
            CO = Contractual Obligations
            OA = Other Adjustments
            PI = Payer initiated reductions
            PR = Patient Responsibility"

        - name: service_adjustment_reason_4
          description: "A code indicating the detailed reason for the fourth adjustment made to the line item."

        - name: service_adjustment_amount_4
          description: "The dollar amount of the fourth adjustment paid or credited to the line item."

        - name: service_adjustment_units_4
          description: "The number of units applicable to the fourth adjustment made to the line item."

        - name: service_adjustment_group_5
          description: >
            "A code indicating the general category of the fifth adjustment made to the line item.
            CO = Contractual Obligations
            OA = Other Adjustments
            PI = Payer initiated reductions
            PR = Patient Responsibility"

        - name: service_adjustment_reason_5
          description: "A code indicating the detailed reason for the fifth adjustment made to the line item."

        - name: service_adjustment_amount_5
          description: "The dollar amount of the fifth adjustment paid or credited to the line item."

        - name: service_adjustment_units_5
          description: "The number of units applicable to the fifth adjustment made to the line item."

        - name: total_charge_per_bill
          description: "The cumulative dollar amount of all line items on the bill."

        - name: total_amount_paid_per_bill
          description: "The total dollar amount paid or credited for the entire bill."

        - name: bill_type
          description: "Type of bill, e.g., SV4 for Drug (Pharmacy) Service."

        - name: billing_type_code
          description: >
            "Identifies the kind of billing:
            DM = Durable Medical
            MO = Mail Order Drug
            RX = Pharmacy or Drug."

        - name: place_of_service_bill_code
          description: "Identifies the place of service at the bill level. Always 'B' for pharmacy bills."

        - name: date_insurer_received_bill
          description: "The calendar date the insurer received the bill from the provider."

        - name: date_of_bill
          description: "The provider's bill date."

        - name: date_insurer_paid_bill
          description: "The calendar date the insurer or financially responsible party paid the bill."

        - name: transaction_tracking_number
          description: "A number assigned by the sender (the organization that actually sent the data)."

        - name: header_bill_selection_date
          description: "Bill selection date from the header, used for alignment with detail records."

        - name: reporting_period_start_date
          description: "The start date during which the information sent was processed."

        - name: reporting_period_end_date
          description: "The end date during which the information sent was processed."


  - name: fact_professional_claim
    description: "Fact table for professional claim line items, combining detail and header information."
    config:
      schema: claims_model
      materialized: incremental
      alias: professional_claim 
      columns:
        - name: row_id
          description: "Unique identifier for the row."

        - name: bill_selection_date
          description: "Bill Selection Date is a date field common to bill and bill line item records. It is usually the earliest date of service on a bill."

        - name: bill_id
          description: "Bill ID uniquely identifies a bill and links line items to the bill."
          tests:
            - not_null

        - name: bill_detail_id
          description: "Bill Detail ID uniquely identifies a bill line item."
          tests:
            - not_null

        - name: line_number
          description: "The number of the line item on the bill."
          tests:
            - not_null

        - name: hcpcs_line_procedure_billed
          description: >
            "Identifies the treatment that was rendered and billed. HCPCS is the abbreviation for Health Care Financing Administration's Common Procedure Coding System. HCPCS codes include Level 1 CPT procedure codes."

        - name: first_hcpcs_modifier_billed
          description: "The first two-character code identifying special circumstances related to the procedure billed."

        - name: second_hcpcs_modifier_billed
          description: "The second two-character code identifying special circumstances related to the procedure billed."

        - name: third_hcpcs_modifier_billed
          description: "The third two-character code identifying special circumstances related to the procedure billed."

        - name: fourth_hcpcs_modifier_billed
          description: "The fourth two-character code identifying special circumstances related to the procedure billed."

        - name: procedure_description
          description: "Free form text describing the treatment rendered."

        - name: total_charge_per_line
          description: "The service charge amount for the line item."

        - name: days_units_code
          description: >
            "Indicates the time or units billed or paid.
            DA = Days
            MJ = Minutes
            UN = Unit"

        - name: days_units_billed
          description: "The number of services billed for the line item in days or units."

        - name: place_of_service_line_code
          description: >
            "Identifies the place where the medical service was rendered. Examples:
            21 = Inpatient Hospital
            56 = Psychiatric Residential Treatment Center
            72 = Rural Health Clinic"

        - name: first_diagnosis_pointer
          description: "References the diagnosis code (ICD-9 CM or ICD-10 CM) for which the medical services were rendered."

        - name: second_diagnosis_pointer
          description: "References the diagnosis code (ICD-9 CM or ICD-10 CM) for which the medical services were rendered."

        - name: third_diagnosis_pointer
          description: "References the diagnosis code (ICD-9 CM or ICD-10 CM) for which the medical services were rendered."

        - name: fourth_diagnosis_pointer
          description: "References the diagnosis code (ICD-9 CM or ICD-10 CM) for which the medical services were rendered."

        - name: crna_supervision_indicator
          description: >
            "Flags that a Certified Registered Nurse Anesthetist (CRNA) was supervised.
            Y = Yes
            N = No"

        - name: provider_agreement_line_code
          description: >
            "Indicates the type of provider agreement applicable to the line item.
            H = Network
            N = No Agreement
            P = Participation Agreement
            Y = PPO Agreement"

        - name: service_line_from_date
          description: "The starting date that services were performed for the line item."

        - name: service_line_to_date
          description: "The ending date that services were performed for the line item."

        - name: contract_line_type_code
          description: >
            "A two-character code indicating the line item contractual arrangement for provider reimbursement.
            01 = Diagnosis Related Group
            02 = Per Diem
            03 = Variable Per Diem
            04 = Flat
            05 = Capitate
            06 = Percent
            09 = Other"

        - name: treatment_line_authorization
          description: >
            "Defaults to the Treatment Authorization Number (DN581 at the bill level) unless a data element is transmitted in this field.
            Y = reported
            N = not reported."

        - name: total_amount_paid_per_line
          description: "The total dollar amount paid or credited to the line item."

        - name: hcpcs_line_procedure_paid
          description: "Identifies the treatment that was rendered and paid. HCPCS is the abbreviation for Health Care Financing Administration's Common Procedure Coding System."

        - name: first_hcpcs_modifier_paid
          description: "The first two-character code identifying special circumstances related to the procedure paid."

        - name: second_hcpcs_modifier_paid
