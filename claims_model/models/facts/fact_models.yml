          description: "The third two-character code identifying special circumstances related to the procedure paid."

        - name: fourth_hcpcs_modifier_paid
          description: "The fourth two-character code identifying special circumstances related to the procedure paid."

        - name: days_units_paid
          description: "The number of services paid for the line item in days or units."

